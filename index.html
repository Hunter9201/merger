<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>PDF Forge | Merge Multiple PDFs (fixed)</title>
  <!-- pdf-lib CDN - UMD exposes window.PDFLib -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem 1.5rem;
      min-height: 100vh;
    }

    .app-container {
      max-width: 1300px;
      margin: 0 auto;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
      padding: 2rem 2rem 2.5rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1a2a3f, #1e3a5f);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    h1::before {
      content: "📑";
      background: none;
      color: #2c5f8a;
    }

    .sub {
      color: #4a627a;
      margin-top: 0.5rem;
      margin-bottom: 2rem;
      border-left: 4px solid #3b82f6;
      padding-left: 1rem;
      font-weight: 500;
    }

    .upload-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.8rem;
      margin-bottom: 2.5rem;
    }

    .drop-zone {
      flex: 2;
      background: #ffffffdd;
      border: 2px dashed #90b4d4;
      border-radius: 1.8rem;
      padding: 2rem 1rem;
      text-align: center;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .drop-zone.drag-over {
      background: #e9f2fa;
      border-color: #3b82f6;
      border-style: solid;
    }

    .btn-browse {
      background: #1e3a5f;
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 0.5rem;
      display: inline-block;
    }

    .btn-browse:hover {
      background: #0f2b46;
      transform: translateY(-2px);
    }

    .info-badge {
      flex: 1;
      background: white;
      border-radius: 1.5rem;
      padding: 1.2rem 1.4rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .info-badge strong {
      font-size: 1.9rem;
      font-weight: 800;
      color: #1e3a5f;
    }

    .files-header {
      display: flex;
      justify-content: space-between;
      margin: 1rem 0 1rem 0;
    }

    .file-list {
      background: #ffffffcc;
      border-radius: 1.5rem;
      margin: 1rem 0 1.5rem;
      overflow: hidden;
      border: 1px solid #e2edf2;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #e9edf2;
      background: white;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex: 3;
    }

    .file-name {
      font-weight: 600;
      word-break: break-word;
    }

    .file-size {
      font-size: 0.7rem;
      color: #6c86a3;
    }

    .file-actions {
      display: flex;
      gap: 0.6rem;
    }

    .action-btn {
      background: #f0f4f9;
      border: none;
      padding: 0.4rem 0.7rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
    }

    .action-btn.remove {
      color: #b91c1c;
      background: #fee2e2;
    }

    .empty-message {
      padding: 2rem;
      text-align: center;
      color: #7795b6;
    }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin: 1.8rem 0 1.2rem;
      align-items: center;
    }

    .btn {
      border: none;
      padding: 0.8rem 1.8rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .btn.primary {
      background: #1e3a5f;
      color: white;
    }

    .btn.primary:hover {
      background: #0f2b46;
    }

    .btn.secondary {
      background: #eef3fc;
      color: #2c4f6e;
    }

    .filename-group {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f8fafd;
      padding: 0.3rem 1rem;
      border-radius: 60px;
    }

    #outputFilename {
      border: 1px solid #cbdde9;
      border-radius: 40px;
      padding: 0.4rem 1rem;
      width: 170px;
    }

    .status {
      background: #eef2fa;
      border-radius: 1.2rem;
      padding: 0.8rem 1.4rem;
      margin: 1rem 0;
      border-left: 4px solid #3b82f6;
    }

    .download-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      display: inline-block;
      text-decoration: none;
    }

    .download-btn:hover {
      background: #059669;
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>PDF Merger Studio</h1>
  <div class="sub">Combine multiple PDFs — drag, drop, reorder, merge. Works 100%.</div>

  <div class="upload-grid">
    <div class="drop-zone" id="dropZone">
      <div>📂📎</div>
      <p>Drag & drop PDF files here</p>
      <button class="btn-browse" id="browseBtn" type="button">Select PDF files</button>
      <input type="file" id="fileInput" multiple accept="application/pdf" style="display: none;">
    </div>
    <div class="info-badge">
      <span>📄 ready to merge</span>
      <strong id="fileCountBadge">0</strong>
      <span>PDF documents</span>
    </div>
  </div>

  <div class="files-header">
    <h3>📑 Document order (top = first)</h3>
    <small>↑↓ reorder · 🗑 remove</small>
  </div>
  <div id="fileListContainer" class="file-list">
    <div class="empty-message">✨ No PDFs added yet.</div>
  </div>

  <div class="action-bar">
    <button id="mergeBtn" class="btn primary">🔗 MERGE INTO ONE PDF</button>
    <button id="clearBtn" class="btn secondary">🗑 Clear all</button>
    <div class="filename-group">
      <label>📁 Output:</label>
      <input type="text" id="outputFilename" value="merged_document.pdf">
    </div>
  </div>

  <div id="status" class="status">✅ Ready — Add PDFs and merge.</div>
  <div id="downloadSection" class="download-section" style="display: none;"></div>
</div>

<script>
  (function() {
    // Check if PDFLib is loaded
    if (typeof PDFLib === 'undefined') {
      document.getElementById('status').innerHTML = '❌ CRITICAL: pdf-lib library failed to load. Check your internet connection and reload.';
      console.error('PDFLib not loaded');
      return;
    }

    let fileItems = [];        // { id, file, name, size }
    let currentBlobUrl = null;
    let isMerging = false;

    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function revokeBlob() {
      if (currentBlobUrl) {
        URL.revokeObjectURL(currentBlobUrl);
        currentBlobUrl = null;
      }
      const downloadSec = document.getElementById('downloadSection');
      downloadSec.style.display = 'none';
      downloadSec.innerHTML = '';
    }

    function updateBadge() {
      document.getElementById('fileCountBadge').innerText = fileItems.length;
    }

    function renderFileList() {
      const container = document.getElementById('fileListContainer');
      if (!fileItems.length) {
        container.innerHTML = `<div class="empty-message">📭 No PDFs added. Use drag & drop or browse.</div>`;
        updateBadge();
        revokeBlob();
        return;
      }

      let html = '';
      fileItems.forEach((item, idx) => {
        const isFirst = idx === 0;
        const isLast = idx === fileItems.length - 1;
        html += `
          <div class="file-item" data-id="${item.id}">
            <div class="file-info">
              <div>📄</div>
              <div>
                <div class="file-name">${escapeHtml(item.file.name)}</div>
                <div class="file-size">${formatFileSize(item.file.size)}</div>
              </div>
            </div>
            <div class="file-actions">
              <button class="action-btn move-up" data-action="moveUp" data-id="${item.id}" ${isFirst ? 'disabled style="opacity:0.5;"' : ''}>⬆️ Up</button>
              <button class="action-btn move-down" data-action="moveDown" data-id="${item.id}" ${isLast ? 'disabled style="opacity:0.5;"' : ''}>⬇️ Down</button>
              <button class="action-btn remove" data-action="remove" data-id="${item.id}">🗑 Remove</button>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
      updateBadge();
      revokeBlob();
      document.getElementById('status').innerHTML = '📄 File list updated. Ready to merge.';
    }

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function addFiles(filesArray) {
      let added = 0;
      for (let file of filesArray) {
        if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
          fileItems.push({
            id: Date.now() + '-' + Math.random().toString(36).substr(2, 6) + '-' + file.name,
            file: file,
            name: file.name,
            size: file.size
          });
          added++;
        } else {
          document.getElementById('status').innerHTML = `⚠️ Skipped "${file.name}": not a PDF.`;
        }
      }
      if (added) renderFileList();
    }

    function removeFileById(id) {
      fileItems = fileItems.filter(item => item.id !== id);
      renderFileList();
    }

    function moveUp(id) {
      const idx = fileItems.findIndex(i => i.id === id);
      if (idx > 0) {
        [fileItems[idx-1], fileItems[idx]] = [fileItems[idx], fileItems[idx-1]];
        renderFileList();
      }
    }

    function moveDown(id) {
      const idx = fileItems.findIndex(i => i.id === id);
      if (idx !== -1 && idx < fileItems.length-1) {
        [fileItems[idx+1], fileItems[idx]] = [fileItems[idx], fileItems[idx+1]];
        renderFileList();
      }
    }

    function clearAll() {
      fileItems = [];
      renderFileList();
    }

    // MAIN MERGE FUNCTION - using PDFLib (correct global)
    async function mergePDFs() {
      if (isMerging) {
        document.getElementById('status').innerHTML = '⏳ Merge in progress, wait...';
        return;
      }
      if (fileItems.length === 0) {
        document.getElementById('status').innerHTML = '❌ No PDF files to merge. Add some first.';
        return;
      }

      isMerging = true;
      const mergeBtn = document.getElementById('mergeBtn');
      const clearBtn = document.getElementById('clearBtn');
      const statusDiv = document.getElementById('status');
      mergeBtn.disabled = true;
      clearBtn.disabled = true;
      mergeBtn.innerHTML = '⏳ Merging...';
      statusDiv.innerHTML = '🔄 Loading PDFs, please wait (large files may take a moment)...';

      try {
        // Create new PDF document using PDFLib global
        const mergedPdf = await PDFLib.PDFDocument.create();

        for (let i = 0; i < fileItems.length; i++) {
          const item = fileItems[i];
          statusDiv.innerHTML = `📄 Processing (${i+1}/${fileItems.length}): ${escapeHtml(item.file.name)} ...`;

          const arrayBuffer = await item.file.arrayBuffer();
          let sourcePdf;
          try {
            sourcePdf = await PDFLib.PDFDocument.load(arrayBuffer);
          } catch (err) {
            throw new Error(`Failed to load PDF "${item.file.name}": it may be corrupted or password-protected.`);
          }

          const pageIndices = sourcePdf.getPageIndices();
          if (pageIndices.length === 0) continue;

          const copiedPages = await mergedPdf.copyPages(sourcePdf, pageIndices);
          for (let page of copiedPages) {
            mergedPdf.addPage(page);
          }
        }

        if (mergedPdf.getPageCount() === 0) {
          throw new Error("Merged PDF has zero pages. All source PDFs might be empty or invalid.");
        }

        statusDiv.innerHTML = '💾 Generating final PDF...';
        const pdfBytes = await mergedPdf.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
        currentBlobUrl = URL.createObjectURL(blob);

        let outputName = document.getElementById('outputFilename').value.trim();
        if (!outputName) outputName = "merged_document.pdf";
        if (!outputName.toLowerCase().endsWith('.pdf')) outputName += '.pdf';

        const downloadSection = document.getElementById('downloadSection');
        downloadSection.style.display = 'block';
        downloadSection.innerHTML = `
          <a id="downloadLink" class="download-btn" download="${escapeHtml(outputName)}" href="${currentBlobUrl}">
            ⬇️ DOWNLOAD MERGED PDF: ${escapeHtml(outputName)}
          </a>
          <p style="margin-top: 0.8rem;">✅ Merge successful! Total pages: ${mergedPdf.getPageCount()}</p>
        `;
        statusDiv.innerHTML = `🎉 Merge completed! ${fileItems.length} file(s) merged. Click download.`;
      } catch (err) {
        console.error(err);
        statusDiv.innerHTML = `❌ Merge error: ${err.message}. Check that your PDFs are valid and not encrypted.`;
        revokeBlob();
      } finally {
        isMerging = false;
        mergeBtn.disabled = false;
        clearBtn.disabled = false;
        mergeBtn.innerHTML = '🔗 MERGE INTO ONE PDF';
      }
    }

    // Event delegation for dynamic buttons
    document.getElementById('fileListContainer').addEventListener('click', (e) => {
      const btn = e.target.closest('.action-btn');
      if (!btn) return;
      const action = btn.getAttribute('data-action');
      const id = btn.getAttribute('data-id');
      if (!id) return;
      if (action === 'remove') removeFileById(id);
      if (action === 'moveUp') moveUp(id);
      if (action === 'moveDown') moveDown(id);
    });

    // File input & drag drop
    const browseBtn = document.getElementById('browseBtn');
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');

    browseBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) {
        addFiles(Array.from(e.target.files));
        fileInput.value = '';
      }
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length) {
        const pdfFiles = Array.from(files).filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
        if (pdfFiles.length) addFiles(pdfFiles);
        else document.getElementById('status').innerHTML = '⚠️ Only PDF files are accepted.';
      }
    });

    document.getElementById('mergeBtn').addEventListener('click', mergePDFs);
    document.getElementById('clearBtn').addEventListener('click', clearAll);

    // Update download link name when output field changes
    document.getElementById('outputFilename').addEventListener('input', (e) => {
      const link = document.getElementById('downloadLink');
      if (link) {
        let newName = e.target.value.trim();
        if (!newName) newName = "merged_document.pdf";
        if (!newName.endsWith('.pdf')) newName += '.pdf';
        link.setAttribute('download', newName);
        link.innerHTML = `⬇️ DOWNLOAD MERGED PDF: ${escapeHtml(newName)}`;
      }
    });

    // initial badge
    updateBadge();
  })();
</script>
</body>
</html>
